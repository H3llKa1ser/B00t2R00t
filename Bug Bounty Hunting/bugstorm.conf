# ============================================================================
# BugStorm Configuration File
# Place at: ~/.bugstorm/bugstorm.conf
# ============================================================================

# --- API Keys (for enhanced results) ---
export SHODAN_API_KEY=""
export CENSYS_API_ID=""
export CENSYS_API_SECRET=""
export VIRUSTOTAL_API_KEY=""
export SECURITYTRAILS_API_KEY=""
export GITHUB_TOKEN=""
export CHAOS_API_KEY=""

# --- Notification Webhooks ---
export DISCORD_WEBHOOK=""
export SLACK_WEBHOOK=""

# --- Default Settings ---
export BUGSTORM_THREADS=50
export BUGSTORM_RATE_LIMIT=1000
export BUGSTORM_TIMEOUT=10
export BUGSTORM_SCOPE="full"

# --- Custom Paths ---
export BUGSTORM_WORDLIST="$HOME/bugstorm/wordlists/subdomains.txt"
export BUGSTORM_RESOLVERS="$HOME/bugstorm/wordlists/resolvers.txt"
export BUGSTORM_DIR_WORDLIST="$HOME/bugstorm/wordlists/dirsearch.txt"
export BUGSTORM_RESULTS="$HOME/bugstorm/results"

# --- Proxy (for tools that support it) ---
export HTTP_PROXY=""
export HTTPS_PROXY=""

# --- Scope Exclusions (one per line) ---
# Create ~/.bugstorm/exclusions.txt with domains/IPs to exclude
